name: Notify main branch updates

on:
  push:
    branches:
      - main

jobs:
  notify:
    name: Notify collaborator
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack notification
        env:
          WEBHOOK_URL: ${{ secrets.MAIN_UPDATE_SLACK_WEBHOOK_URL }}
          REPOSITORY: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "MAIN_UPDATE_SLACK_WEBHOOK_URL is not configured; skipping notification."
            exit 0
          fi

          SHORT_SHA="${COMMIT_SHA:0:8}"
          MESSAGE="main was updated in ${REPOSITORY} by ${COMMIT_AUTHOR}: ${COMMIT_MESSAGE}. Pull latest with: git checkout main && git pull origin main. Commit ${SHORT_SHA}: ${COMMIT_URL}"
          jq -n --arg text "$MESSAGE" '{text: $text}' \
            | curl -sS -X POST -H 'Content-type: application/json' --data @- "$WEBHOOK_URL"
